<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Formulário PW</title>
        <script src="app.js" defer></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h2>Formulário PW
            <a href="https://uminho.pt" target="_blank"> 
                Universidade do Minho
            </a>
        </h2>

        <form id="108734" class="container mt-4">
            <label>Nome:</label>
            <input type="text" id="nome" class="form-control" placeholder="Pedro Afonso Ribeiro Lopes"><br><br>

            <label>Email:</label>
            <input type="email" id="email" class="form-control" placeholder="a108734@uminho.pt"><br><br>

            <label>Data Nascimento:</label>
            <input type="date" id="nascimento" class="form-control"><br><br>

            <label>Localidade:</label>
            <input type="text" id="localidade" class="form-control" placeholder="Guimarães"><br><br>

            <label>Profissão:</label>
            <select id="profissao" class="form-control">
                <option>Estudante</option>
                <option>Professor</option>
                <option>Engenheiro</option>
                <option>Designer</option>
                <option>Outro</option>
            </select><br><br>

            <button type="submit" class="btn btn-primary">Enviar</button>

        </form>

        <div id="result" class="container mt-4" text-white></div>
    </body>
</html>
