<html>
<head>

  <link rel="stylesheet" hret="style.css">

</head>

<body>
    
    <div>
        <h5>
            Formulário desenvolvido por: João Silva
        </h5>

        <h2>
            Formulário PW
            <a href="https://www.uminho.pt/PT" target="_blank">Universidade do Minho</a>

        <form id="PG12345">

            <input type="text" name="nome" placeholder="Nome"><br>
            <input type="email" name="email" placeholder="Email"><br>
            <input type="date" name="nascimento"><br>
            <input type="text" name="localidade"><br>

            <select name="disciplinas">
                <option value="pw">PW</option>
                <option value="doti">DOTI</option>
                <option value="outro">Outro</option>
            </select>

            <button type="submit" onclick="guardar()">Guardar</button>
        </form>
    </div>

    <script>
        var SID = "A108358";
        var fname = "João Silva";
        var eid = "PG12345";
        var email = "joaosilva@gmail.com";

        document.getElementById(eid).addEventListener("submit", function() {
            alert("Formulário de PW do " + email);

            var form = document.getElementById(SID);

            var dados = {
                nome: form.nome.value,
                email: form.email.value,
                nascimento: form.nascimento.value,
                localidade: form.localidade.value,
                disciplinas: form.disciplinas.value
            };
            localStorage.setItem(SID, JSON.stringify(dados));
        });
    </script>

</body>
</html>
